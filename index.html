<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Meu Financeiro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <h1>Meu Financeiro</h1>
      <p>Planejador financeiro por ciclos</p>
    </div>
    <form id="loginForm">
      <input id="loginEmail" type="email" placeholder="E-mail" required autocomplete="email">
      <input id="loginPassword" type="password" placeholder="Senha" required autocomplete="current-password">
      <p id="loginError" class="login-error"></p>
      <div class="login-actions">
        <button type="submit" id="loginBtn" class="primary">Entrar</button>
        <button type="button" id="signupBtn" class="secondary">Criar conta</button>
      </div>
    </form>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
  <header class="header">
    <div>
      <h1>Meu Financeiro</h1>
      <p>Planejador financeiro por ciclos</p>
    </div>
    <div class="header-actions">
      <div class="cycle-card">
        <small>Ciclo ativo</small>
        <strong id="cycleTitle">Nenhum ciclo</strong>
        <span id="cycleDates">Gere ciclos no Perfil</span>
      </div>
      <button id="profileBtn" class="profile-btn"><span class="avatar" id="avatarLetter">?</span> Perfil</button>
      <button id="logoutBtn" class="logout-btn">Sair</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="summary">Resumo</button>
    <button class="tab" data-view="cash">Gastos do Mês</button>
    <button class="tab" data-view="installments">Parceladas</button>
    <button class="tab" data-view="receivables">A Receber</button>
    <button class="tab" data-view="payables">A Pagar</button>
    <button class="tab" data-view="fixed">Contas Fixas</button>
    <button class="tab" data-view="goals">Reservas e Objetivos</button>
    <button class="tab" data-view="cycleHistory">Histórico</button>
  </nav>

  <main>
    <section id="summary" class="view active"></section>
    <section id="cash" class="view"></section>
    <section id="installments" class="view"></section>
    <section id="receivables" class="view"></section>
    <section id="payables" class="view"></section>
    <section id="fixed" class="view"></section>
    <section id="goals" class="view"></section>
    <section id="cycleHistory" class="view"></section>
    <section id="setup" class="view"></section>
  </main>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
